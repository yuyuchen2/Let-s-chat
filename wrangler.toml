# Cloudflare Worker configuration for connected Workers Builds.
# Do not hard-code account_id here: Cloudflare provides the account context in CI.
name = "letschat"
main = "worker/chat-worker.mjs"
compatibility_date = "2025-10-15"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "chat_db"
database_id = "d3d83a2c-765a-4993-a4aa-0cdd0b7e6ae9"
